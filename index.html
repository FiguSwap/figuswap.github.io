
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FiguSwap</title>

  <style>
    @font-face {
      font-family: "Syne";
      src: url("/assets/fonts/Syne/Syne-ExtraBold.ttf") format("truetype");
      font-weight: 800;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Syne";
      src: url("/assets/fonts/Syne/Syne-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Geist Mono";
      src: url("/assets/fonts/GeistMono/GeistMono-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Geist Mono";
      src: url("/assets/fonts/GeistMono/GeistMono-SemiBold.ttf") format("truetype");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --background: #0b0b0d;
      --text: #f5f5f7;
      --muted: #8e8e93;
      --accent: #00e676;
      --border: #2a2a2e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Geist Mono", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(0, 230, 118, 0.18), transparent 24%),
        radial-gradient(circle at 10% 15%, rgba(0, 230, 118, 0.10), transparent 20%),
        radial-gradient(circle at 90% 86%, rgba(255, 121, 32, 0.08), transparent 24%),
        #0b0b0d;
      color: var(--text);
    }

    main {
      min-height: 100vh;
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero {
      width: 100%;
    }

    .app-icon {
      width: 136px;
      height: 136px;
      margin: 0 auto 32px;
      border-radius: 34px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(0, 230, 118, 0.28);
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      margin: 0;
      font-family: "Syne", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(56px, 10vw, 96px);
      line-height: 0.9;
      letter-spacing: -5px;
      font-weight: 800;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin: 26px auto 0;
      max-width: 760px;
      color: #d2d2d7;
      font-family: "Geist Mono", monospace;
      font-size: clamp(13px, 2.2vw, 18px);
      line-height: 1.8;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .store {
      margin-top: 42px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .store a {
      display: inline-flex;
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }

    .store img {
      height: 52px;
      width: auto;
      display: block;
    }

    .coming-soon {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .links {
      margin-top: 38px;
      display: flex;
      flex-wrap: wrap;
      gap: 22px;
      justify-content: center;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
      font-family: "Geist Mono", monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .links a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .contact {
      margin-top: 28px;
      color: var(--muted);
      font-family: "Geist Mono", monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    .contact a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 58px;
      color: #6f6f75;
      font-family: "Geist Mono", monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    @media (max-width: 520px) {
      main {
        padding: 42px 22px;
      }

      .app-icon {
        width: 112px;
        height: 112px;
        border-radius: 28px;
      }

      h1 {
        letter-spacing: -3px;
      }

      .subtitle {
        letter-spacing: 0.16em;
      }

      .store img {
        height: 46px;
      }

      .links {
        gap: 16px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="hero">
      <div class="app-icon">
        <img src="/assets/figuswap-icon.png" alt="FiguSwap app icon" />
      </div>

      <h1>Figu<span>Swap</span></h1>

      <p class="subtitle">
        Intercambia. Completa. Colecciona.
      </p>

      <div class="store">
        <a href="#" aria-label="Download on the App Store">
          <img src="/assets/app-store-badge.svg" alt="Download on the App Store" />
        </a>
      </div>

      <p class="coming-soon">
        Próximamente disponible en App Store
      </p>

      <nav class="links" aria-label="Enlaces principales">
        <a href="/terms-and-privacy/es/">Términos y privacidad</a>
        <a href="mailto:figuswap.app@gmail.com">Contacto</a>
      </nav>

      <p class="contact">
        ¿Necesitas ayuda? Escríbenos a
        <a href="mailto:figuswap.app@gmail.com">figuswap.app@gmail.com</a>
      </p>

      <footer>
        FiguSwap · 2026
      </footer>
    </section>
  </main>
</body>
</html>
