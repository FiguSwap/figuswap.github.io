<!DOCTYPE html>
  <html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FiguSwap</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0b0b0d;
        color: #f5f5f7;
        line-height: 1.6;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 56px 24px;
      }

      h1 {
        font-size: clamp(40px, 10vw, 64px);
        line-height: 1;
        margin: 0 0 16px;
        letter-spacing: -0.03em;
      }

      p {
        color: #d2d2d7;
        font-size: 18px;
        margin: 0 0 32px;
      }

      nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
      }

      a {
        display: block;
        color: #f5f5f7;
        text-decoration: none;
        background: #151518;
        border: 1px solid #2a2a2e;
        border-radius: 16px;
        padding: 18px 20px;
        font-weight: 600;
      }

      a:hover {
        border-color: #12d97c;
        color: #12d97c;
      }

      .muted {
        color: #8e8e93;
        font-size: 14px;
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FiguSwap</h1>
      <p>Intercambia figuritas de forma simple, organizada y segura.</p>

      <nav aria-label="Documentos de FiguSwap">
        <ul>
          <li><a href="/terms-and-privacy.html">Términos y privacidad</a></li>
          <li><a href="mailto:figuswap.app@gmail.com">Soporte</a></li>
        </ul>
      </nav>

      <p class="muted">FiguSwap · 2026</p>
    </main>
  </body>
  </html>
